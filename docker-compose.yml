version: '3.8'

services:
  backend:
    build: 
      context: ./backend     
      dockerfile: Dockerfile
    ports:
      - "3000:3000"           
    env_file:
      - ./backend/.env      
    restart: always
  frontend:
    build: 
      context: ./frontend     
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:3000
    ports:
      - "5173:80"             
    depends_on:
      - backend             
    restart: always